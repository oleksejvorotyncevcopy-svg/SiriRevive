name: Build SiriRevive Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Скачиваем код из репозитория
      uses: actions/checkout@v4

    - name: Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install dnslib biplist groq pyinstaller

    - name: Собираем EXE файл
      run: |
        pyinstaller --noconsole --onefile --add-data "guzzoni.crt;." --add-data "guzzoni.key;." --add-data "libspeex.dll;." SiriRevive.py

    - name: Сохраняем готовый EXE
      uses: actions/upload-artifact@v4
      with:
        name: SiriRevive_Windows_EXE
        path: dist/SiriRevive.exe
